<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Usage Monitor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      background: #1a1a1f;
      color: rgba(255,255,255,0.85);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      padding: 14px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .header-icon {
      width: 20px;
      height: 20px;
      opacity: 0.9;
    }

    .title {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
    }

    .refresh-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      font-size: 11px;
      padding: 3px 8px;
      transition: all 0.15s;
    }

    .refresh-btn:hover {
      border-color: rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.8);
    }

    .rows {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .row {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .row-header {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .label {
      flex: 1;
      color: rgba(255,255,255,0.6);
      font-size: 12px;
    }

    .pct {
      font-size: 12px;
      font-weight: 600;
      min-width: 32px;
      text-align: right;
    }

    .reset {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      white-space: nowrap;
    }

    .bar-track {
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 2px;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 4px 0;
    }

    .footer {
      margin-top: 10px;
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      text-align: right;
    }

    .no-data {
      color: rgba(255,255,255,0.35);
      font-size: 12px;
      font-style: italic;
      text-align: center;
      padding: 16px 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <img class="header-icon" src="icons/icon48.png" alt="">
      <span class="title">Plan Usage Limits</span>
    </div>
    <button class="refresh-btn" id="refreshBtn">Refresh</button>
  </div>
  <div id="content">
    <div class="no-data">Navigate to claude.ai to load data</div>
  </div>
  <div class="footer" id="footer"></div>
  <script src="popup.js"></script>
</body>
</html>
